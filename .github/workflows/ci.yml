name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Version comes from the packageManager field in package.json —
      # specifying it here too makes pnpm/action-setup fail on the conflict.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # Firestore emulator needs a JDK; ubuntu-latest ships one but pin it.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm --filter @mbh/functions typecheck
      - run: pnpm check:web
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm test:rules
      - run: pnpm test:contract
      - run: pnpm test:functions
      - run: pnpm seed
      - run: pnpm build
      # E2E browser journeys against the FULL emulator stack (auth + firestore +
      # functions + hosting). run-e2e.sh builds the emulator bundle, runs the
      # journeys, and restores the prod bundle. Needs chromium + the JDK above.
      - run: pnpm --filter @mbh/e2e exec playwright install --with-deps chromium
      - run: pnpm test:e2e

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    # Only from main, and only when the repo variable is explicitly enabled.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.PRODUCTION_DEPLOY == 'true'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write # required for keyless Workload Identity Federation
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build # apps/web/dist for hosting (functions build in predeploy)
      # Keyless auth — no service-account keys. The WIF provider's attribute
      # condition pins this repo; the repo variables come from terraform output.
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SERVICE_ACCOUNT }}
      - run: pnpm exec firebase deploy --only functions,hosting,firestore --project mybackhaul-app --non-interactive
      - run: pnpm smoke:prod
        env:
          SMOKE_BASE_URL: https://mybackhaul-app.web.app
