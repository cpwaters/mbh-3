name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Version comes from the packageManager field in package.json —
      # specifying it here too makes pnpm/action-setup fail on the conflict.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # Firestore emulator needs a JDK; ubuntu-latest ships one but pin it.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm check:web
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm test:rules
      - run: pnpm seed
      - run: pnpm build
  # The deploy job arrives at bootstrap step 6: needs validate, main only,
  # gated on PRODUCTION_DEPLOY == 'true', keyless auth via Workload Identity
  # Federation. Hand-deploys are an emergency escape hatch, not a path.
